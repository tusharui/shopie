name: Deploy

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  deploy-backend:
    name: Deploy backend (FastAPI)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t shopie-backend:${{ github.sha }} \
            --build-arg DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --build-arg GOOGLE_API_KEY="${{ secrets.GOOGLE_API_KEY }}" \
            --build-arg PINECONE_API_KEY="${{ secrets.PINECONE_API_KEY }}" \
            -f Dockerfile .

      # ---- Option A: Push to container registry ----
      # - name: Push to Docker Hub
      #   run: |
      #     docker tag shopie-backend:${{ github.sha }} ${{ secrets.DOCKER_USER }}/shopie-backend:latest
      #     docker push ${{ secrets.DOCKER_USER }}/shopie-backend:latest

      # ---- Option B: Deploy to cloud (example: Render) ----
      # - name: Deploy to Render
      #   run: |
      #     curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_ID }}/deploys" \
      #       -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"

      # ---- Option C: Deploy to Railway ----
      # - name: Deploy to Railway
      #   run: |
      #     npx railway up --service shopie-backend

  deploy-frontend:
    name: Deploy frontend (Next.js)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build

      # ---- Option A: Deploy to Vercel ----
      # - name: Deploy to Vercel
      #   run: npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }}

      # ---- Option B: Deploy to Cloudflare Pages ----
      # - name: Deploy to Cloudflare Pages
      #   run: npx wrangler pages deploy out/ --project-name=shopie
