services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shopie-backend
    ports:
      - "8000:8000"
    env_file:
      - backend/db/.env
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        API_BACKEND_URL: http://backend:8000
    container_name: shopie-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - backend
    restart: unless-stopped
